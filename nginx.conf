# Share2Brain nginx config — fully replaces the default (mounted/baked at
# /etc/nginx/nginx.conf). nginx is the ONLY host-exposed service (AD-7); it
# fronts the backend API and serves the static SPA. backend listens only on the
# internal Docker network and never serves SPA files.
events {}

http {
  # Serve JS/CSS with correct MIME types (the SPA won't load otherwise).
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # M-10: never advertise the nginx version in the Server header / error pages.
  server_tokens off;

  # When behind a reverse proxy (Caddy in prod), forward the original
  # X-Forwarded-Proto so Express sees "https" and sets Secure cookies
  # correctly. Falls back to $scheme when no upstream proxy is present
  # (local dev).
  map $http_x_forwarded_proto $proxy_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
  }

  # backend is reachable as http://backend:3000 on the Compose network.
  server {
    listen 80;

    # Health check, reachable through the single exposed port. GET /health is
    # top-level and auth-exempt — do NOT rename to /api/health. Kept on :80 so
    # container healthchecks work even once TLS/redirect is enabled below.
    location = /health {
      proxy_pass http://backend:3000/health;
    }

    # Chat streams via SSE (AD-4). Buffering/caching MUST be off or tokens are
    # withheld until the response ends; long read timeout for open streams
    # (AD-7). Longest-prefix match means this wins over /api/ for /api/chat.
    location /api/chat {
      proxy_pass http://backend:3000;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_set_header Connection '';
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      # Overwrite (never append) the client's forwarded-for so the backend's
      # `trust proxy 1` rate limiter keys on the REAL peer IP — a client-sent
      # X-Forwarded-For must not be trusted (audit A-2).
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $proxy_proto;
      # No response security headers here: SSE is not an HTML document and the
      # backend (helmet) owns API response headers (M-10).
    }

    # Everything else under /api/ proxies to the backend.
    location /api/ {
      proxy_pass http://backend:3000;
      proxy_set_header Host $host;
      # Overwrite (never append) the client's forwarded-for so the backend's
      # `trust proxy 1` rate limiter keys on the REAL peer IP — a client-sent
      # X-Forwarded-For must not be trusted (audit A-2).
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $proxy_proto;
      # No response security headers here: the backend (helmet) owns them (M-10).
    }

    # Static SPA: serve built files, falling back to index.html for client-side
    # routing (AD-3).
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;

      # M-10: response security headers for the SPA document/assets. `always`
      # ensures they are emitted on error responses too. CSP scope:
      #   - scripts: same-origin only, plus a SHA-256 hash pinning the ONE inline
      #     theme-init script in index.html (FOUC-free, runs before first paint).
      #     No 'unsafe-inline' — any edit to that script must update the hash below.
      #   - styles/fonts: same-origin plus Google Fonts (fonts.googleapis.com CSS,
      #     fonts.gstatic.com font files) for the design-system typefaces.
      #   - cannot be framed; connects only to its own origin (the /api proxy).
      add_header X-Frame-Options DENY always;
      add_header X-Content-Type-Options nosniff always;
      add_header Referrer-Policy no-referrer always;
      add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'sha256-WvgcGE+DoY6XIHwjBD2Bo5oFDxYVTCrBwe39MZxfcnU='; frame-ancestors 'none'; base-uri 'self'" always;
    }
  }

  # ── M-11: TLS on :443 (operator-enabled) ────────────────────────────────────
  # Port 443 is published by the compose `nginx` service, but this repo ships NO
  # certificates, so the HTTPS server below is COMMENTED OUT: nginx opens and
  # validates the `ssl_certificate` / `ssl_certificate_key` files during
  # `nginx -t`, and a missing file makes the config test FAIL. Keeping the block
  # commented lets `nginx -t` pass out of the box while the :80 server above
  # serves the app directly (no forced redirect — dev/plain-HTTP works
  # unchanged). This is the additive approach: enable TLS by uncommenting once
  # real certs exist.
  #
  # TO ENABLE TLS in production:
  #   1. Provide real certs on the host at ./certs — bind-mounted read-only to
  #      /etc/nginx/certs by the compose `nginx` service (see docker-compose.yml):
  #        ./certs/fullchain.pem    (cert + intermediate chain)
  #        ./certs/privkey.pem      (private key)
  #   2. Uncomment the `server { listen 443 ssl; ... }` block below.
  #   3. OPTIONAL hard redirect: to force HTTP→HTTPS, replace the `location /`
  #      and `location /api*` blocks in the :80 server above with a single
  #      `return 301 https://$host$request_uri;` — but KEEP `location = /health`
  #      on :80 so container healthchecks keep working over plain HTTP.
  #
  # server {
  #   listen 443 ssl;
  #   http2 on;
  #
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_prefer_server_ciphers on;
  #
  #   # HSTS — only meaningful (and only served) over real TLS.
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #
  #   # Mirror the :80 proxying exactly.
  #   location = /health {
  #     proxy_pass http://backend:3000/health;
  #   }
  #
  #   location /api/chat {
  #     proxy_pass http://backend:3000;
  #     proxy_buffering off;
  #     proxy_cache off;
  #     proxy_read_timeout 300s;
  #     proxy_set_header Connection '';
  #     proxy_http_version 1.1;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $remote_addr;
  #     proxy_set_header X-Forwarded-Proto $scheme;
  #   }
  #
  #   location /api/ {
  #     proxy_pass http://backend:3000;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $remote_addr;
  #     proxy_set_header X-Forwarded-Proto $scheme;
  #   }
  #
  #   location / {
  #     root /usr/share/nginx/html;
  #     try_files $uri $uri/ /index.html;
  #     add_header X-Frame-Options DENY always;
  #     add_header X-Content-Type-Options nosniff always;
  #     add_header Referrer-Policy no-referrer always;
  #     add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'sha256-WvgcGE+DoY6XIHwjBD2Bo5oFDxYVTCrBwe39MZxfcnU='; frame-ancestors 'none'; base-uri 'self'" always;
  #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #   }
  # }
}
